<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Wedding Invitation</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --background-image:url("background.jpg");
      --seal-image:url("seal.png");
    }

    html,
    body{
      width:100%;
      min-height:100%;
    }

    body{
      overflow:hidden;
      min-height:100vh;

      display:grid;
      place-items:center;

      font-family:Georgia, serif;

      background:
        linear-gradient(rgba(255,255,255,.08), rgba(255,255,255,.08)),
        var(--background-image);

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;

      background:
        radial-gradient(circle at center,
        transparent 0%,
        rgba(0,0,0,.12) 100%);

      pointer-events:none;
      z-index:1;
    }

    .grain{
      position:fixed;
      inset:0;

      opacity:.08;
      pointer-events:none;
      mix-blend-mode:multiply;

      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .intro{
      position:fixed;
      inset:0;

      display:grid;
      place-items:center;

      z-index:5;

      transition:
        opacity 1.15s ease,
        transform 1.15s cubic-bezier(.16,.84,.24,1),
        filter 1.15s ease,
        visibility 1.15s ease;
    }

    /* ZOOM INSIDE ENVELOPE */
    .intro.redirecting{
      opacity:0;

      transform:
        scale(2.5);

      filter:blur(8px);

      visibility:hidden;

      transform-origin:center center;
    }

    .scene{
      width:min(88vw,780px);

      aspect-ratio:1.58/1;

      position:relative;

      perspective:1800px;

      animation:introIn 1.2s ease both;
    }

    @keyframes introIn{
      from{
        opacity:0;
        transform:
          translateY(30px)
          scale(.94);
      }

      to{
        opacity:1;
        transform:
          translateY(0)
          scale(1);
      }
    }

    .scene-shadow{
      position:absolute;

      left:10%;
      right:10%;
      bottom:-8%;

      height:20%;

      border-radius:50%;

      background:
        radial-gradient(
          ellipse at center,
          rgba(0,0,0,.28),
          transparent 72%
        );

      filter:blur(18px);

      transform:rotateX(70deg);

      transition:
        transform 1s ease,
        opacity 1s ease;

      z-index:0;
    }

    .intro.open .scene-shadow{
      transform:
        rotateX(70deg)
        scale(.82);

      opacity:.55;
    }

    .envelope-wrap{
      position:absolute;
      inset:0;

      transform-style:preserve-3d;

      transition:
        transform 1.2s cubic-bezier(.16,.84,.24,1);

      filter:
        drop-shadow(0 32px 40px rgba(0,0,0,.24))
        drop-shadow(0 12px 18px rgba(0,0,0,.12));

      z-index:2;
    }

    /* ENVELOPE ZOOM */
    .intro.open .envelope-wrap{
      transform:
        rotateX(4deg)
        translateY(4px)
        scale(1.04);
    }

    .envelope-image{
      position:absolute;
      inset:0;

      width:100%;
      height:100%;

      object-fit:contain;

      user-select:none;
      pointer-events:none;

      transition:
        opacity .8s ease,
        transform 1s cubic-bezier(.16,.84,.24,1),
        filter .8s ease;
    }

    .envelope-closed{
      z-index:2;

      opacity:1;

      transform:
        scale(1)
        rotateX(0deg);
    }

    .envelope-open{
      z-index:1;

      opacity:0;

      transform:
        scale(.96)
        rotateX(-10deg)
        translateY(14px);
    }

    .intro.open .envelope-closed{
      opacity:0;

      transform:
        scale(1.02)
        rotateX(8deg)
        translateY(10px);

      filter:blur(1px);
    }

    .intro.open .envelope-open{
      opacity:1;

      transform:
        scale(1)
        rotateX(0deg)
        translateY(0);
    }

    /* TOP FLAP */
    .flap-light{
      position:absolute;

      left:10%;
      top:8%;

      width:70%;
      height:45%;

      background:#d4c8d5;
       

      clip-path:polygon(0 0,100% 0,50% 100%);

     
      transform-origin: 50% 0%;
      transform-style:preserve-3d;
      backface-visibility:hidden;
      will-change:transform;

      transition:
        transform 1.25s cubic-bezier(.16,.84,.24,1),
        opacity 1s ease;

      pointer-events:none;

      z-index:3;
    }

    /* OPENING FLAP */
.intro.open .flap-light{
  transform:
    translateY(-95px)
    translateZ(90px)
    rotateX(175deg)
    scale(1.8);

  opacity:.95;
}
    .seal-button{
      position:absolute;

      left:50%;
      top:51%;

      transform:
        translate(-50%,-50%);

      width:120px;

      aspect-ratio:1;

      border:0;
      border-radius:50%;

      cursor:pointer;

      z-index:5;

      background:
        var(--seal-image),
        radial-gradient(circle,
        #a7192a,
        #680714 72%,
        #3f0209 100%);

      background-size:cover;
      background-position:center;

      box-shadow:
        inset 0 5px 10px rgba(255,255,255,.2),
        inset 0 -10px 18px rgba(0,0,0,.28),
        0 14px 26px rgba(76,14,13,.35);

      transition:
        transform .45s ease,
        opacity .6s ease,
        filter .35s ease;
    }

    .seal-button::after{
      content:"";

      position:absolute;
      inset:0;

      border-radius:inherit;

      background:
        radial-gradient(circle at 35% 24%,
        rgba(255,255,255,.32),
        transparent 22%),

        radial-gradient(circle at 70% 72%,
        rgba(30,0,0,.28),
        transparent 42%);

      mix-blend-mode:soft-light;
    }

    .seal-button:hover{
      transform:
        translate(-50%,-50%)
        scale(1.07);

      filter:brightness(1.05);
    }

    .intro.open .seal-button{
      transform:
        translate(-50%,-50%)
        scale(.35)
        rotate(20deg);

      opacity:0;

      pointer-events:none;
    }

    .hint{
      position:absolute;

      left:50%;
      bottom:-60px;

      transform:translateX(-50%);

      color:rgba(70,55,75,.75);

      font-size:clamp(13px,2vw,17px);

      letter-spacing:.08em;

      text-transform:uppercase;

      white-space:nowrap;

      animation:pulse 1.8s ease-in-out infinite;

      transition:opacity .4s ease;
    }

    .intro.open .hint{
      opacity:0;
    }

    @keyframes pulse{
      50%{
        opacity:.45;

        transform:
          translateX(-50%)
          translateY(4px);
      }
    }

    @media (max-width:700px){

      .scene{
        width:95vw;
      }

      .seal-button{
        width:70px;
      }

      .hint{
        bottom:-42px;
        font-size:12px;
      }
    }

    @media (max-width:420px){

      .seal-button{
        width:52px;
      }
    }

  </style>
</head>

<body>

  <main>
    <section class="intro" id="intro">

      <div class="scene">

        <div class="scene-shadow"></div>

        <div class="envelope-wrap">

          <!-- CLOSED ENVELOPE -->
          <img
            class="envelope-image envelope-closed"
            src="envelope.png"
            alt=""
            draggable="false"
          />

          <!-- OPEN ENVELOPE -->
          <img
            class="envelope-image envelope-open"
            src="envelope-open.png"
            alt=""
            draggable="false"
          />

          <!-- FLAP -->
          <div class="flap-light"></div>

          <!-- SEAL -->
          <button
            class="seal-button"
            id="sealButton"
            aria-label="Open invitation">
          </button>

        </div>

        <p class="hint">
          Κάνε tap στο βουλοκέρι
        </p>

      </div>

    </section>
  </main>

  <div class="grain"></div>

  <script>

    const intro = document.getElementById('intro');
    const sealButton = document.getElementById('sealButton');

    /* CHANGE THIS */
    const nextPageUrl = "landing.html";

    sealButton.addEventListener('click', () => {

      intro.classList.add('open');

      /* START ZOOM INSIDE ENVELOPE */
      setTimeout(() => {
        intro.classList.add('redirecting');
      }, 550);

      /* GO TO NEXT PAGE */
      setTimeout(() => {
        window.location.href = nextPageUrl;
      }, 1700);

    });

  </script>

</body>
</html>
